# =============================================================================
#  VerdantIQ — Root Compose Orchestrator
#
#  This file merges backend and data-services compose files for full-stack
#  development. Use the Makefile targets instead of calling this directly.
#
#  Quick reference:
#    make dev               → full stack
#    make dev-backend       → API services + postgres only
#    make dev-dataservices  → Kafka + Spark + MinIO + Iceberg
#    make dev-monitor       → Prometheus + Grafana
#    make dev-frontend      → backend (detached) + Vite dev server
# =============================================================================

include:
  - path: backend/docker-compose.yml
  - path: data-services/docker-compose.yml
