upstream auth_service {
    server auth:8001;
}

upstream tenant_service {
    server tenant:8002;
}

upstream sensor_service {
    server sensor:8003;
}

server {
    listen 8000;
    server_name _;

    # Block all /internal/ routes — never exposed to external clients
    location ~ ^/internal/ {
        return 403;
    }

    # Auth service routes
    location ~ ^/(register|login|logout|users|forgot-password|reset-password)(/.*)?$ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass httponly cookies through (access_token)
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
    }

    # Tenant/billing service routes
    location ~ ^/billings(/.*)?$ {
        proxy_pass http://tenant_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
    }

    # Sensor service routes
    location ~ ^/sensors(/.*)?$ {
        proxy_pass http://sensor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
    }

    # Health checks (aggregate or per-service)
    location /health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    location /health/auth {
        proxy_pass http://auth_service/health;
    }

    location /health/tenant {
        proxy_pass http://tenant_service/health;
    }

    location /health/sensor {
        proxy_pass http://sensor_service/health;
    }

    # Default — 404
    location / {
        return 404;
    }
}
