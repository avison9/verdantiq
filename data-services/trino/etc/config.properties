# =============================================================================
#  Trino Coordinator Config — Dev/Local
#  Single-node coordinator (also schedules tasks) for local development.
# =============================================================================

coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# Memory limits sized for a dev laptop
query.max-memory=2GB
query.max-memory-per-node=512MB
query.max-total-memory-per-node=1GB

# Spill to disk when memory is tight
spill-enabled=true
spill-path=/tmp/trino-spill

# Web UI
web-ui.enabled=true
