# =============================================================================
#  Trino Kafka Catalog — Dev
#  Allows querying raw Kafka topics as tables (useful for debugging
#  sensor data before it lands in Iceberg).
#  See: https://trino.io/docs/current/connector/kafka.html
# =============================================================================

connector.name=kafka
kafka.nodes=kafka1:9092,kafka2:9093,kafka3:9094,kafka4:9095
kafka.default-schema=default

# Load topic-to-table mappings from /etc/trino/kafka/ directory
kafka.table-description-supplier=FILE
kafka.table-description-dir=/etc/trino/kafka
kafka.hide-internal-columns=false

# Schema Registry integration for Avro decoding
kafka.confluent-schema-registry-url=http://schema-registry:8089
