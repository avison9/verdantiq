# =============================================================================
#  Trino Iceberg Catalog — Dev
#  Connects to the local Iceberg REST catalog (iceberg-rest container)
#  which uses MinIO as the S3-compatible object store.
# =============================================================================

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg:8181

# S3/MinIO filesystem (native S3 client — faster than Hadoop FileSystem)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.region=us-east-1

# Enable Iceberg metadata cache for dev performance
iceberg.metadata-cache.enabled=true
iceberg.metadata-cache.max-size=500
