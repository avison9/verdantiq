# ── VerdantIQ Mosquitto MQTT Broker ──────────────────────────────────────────
# Eclipse Mosquitto 2.x configuration

# Listener
listener 1883
protocol mqtt

# WebSocket listener (for browser clients)
listener 9001
protocol websockets

# Authentication — anonymous allowed in dev; swap to password_file in prod
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection limits
max_connections 1024
max_inflight_messages 100
max_queued_messages 1000

# QoS 1/2 message store
message_size_limit 262144

# Keepalive
keepalive_interval 60
