# ── VerdantIQ Mosquitto MQTT Broker ──────────────────────────────────────────
# Eclipse Mosquitto 2.x — minimal valid configuration

# MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (9003 — 9001 is reserved by MinIO console)
listener 9003
protocol websockets

# Authentication — anonymous allowed in dev
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection / message limits
max_connections 1024
max_inflight_messages 100
max_queued_messages 1000
message_size_limit 262144
