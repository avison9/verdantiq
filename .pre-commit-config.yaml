# =============================================================================
#  VerdantIQ pre-commit hooks
#  Install with: pre-commit install  (or: make setup)
#  Run manually: pre-commit run --all-files
# =============================================================================

default_language_version:
  python: python3.10

repos:
  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Python: ruff (linter + formatter — replaces flake8 + black + isort) ───
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Python: mypy (type checking) ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend/fast-api && uv run mypy . --ignore-missing-imports'
        language: system
        files: ^backend/fast-api/.*\.py$
        pass_filenames: false

  # ── Secret scanning ────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── Frontend: eslint ──────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── Frontend: TypeScript type check ───────────────────────────────────────
  - repo: local
    hooks:
      - id: tsc
        name: tsc
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
